{{define "game/container-modal.html"}}
<!-- Container modal — overlays the scene, styled to match the vault UI -->
<div id="container-modal" class="hidden absolute inset-0 flex items-center justify-center z-50"
     style="background: rgba(0,0,0,0.9); pointer-events: auto;">
    <div class="flex flex-col p-2" style="max-width: 96%;">
        <!-- Header: title + close, matching the vault -->
        <div class="flex justify-between items-center mb-2 gap-6">
            <h2 class="text-yellow-400 font-bold" style="font-size: 12px;">
                <span id="container-icon">📦</span>
                <span id="container-title">Container</span>
            </h2>
            <button onclick="closeContainer()" class="text-white px-2 py-1 font-bold"
                    style="background:#dc2626;border-top:2px solid #ef4444;border-left:2px solid #ef4444;border-right:2px solid #991b1b;border-bottom:2px solid #991b1b;font-size:10px;">Close</button>
        </div>

        <!-- Slot usage + type restriction -->
        <div class="flex items-center justify-between mb-2" style="font-size: 8px;">
            <span class="text-gray-400"><span id="container-used-slots">0</span>/<span id="container-total-slots">0</span> slots</span>
            <span id="container-type-restriction" class="text-yellow-400"></span>
        </div>

        <!-- Slots grid — columns/size set in JS to match the slot count -->
        <div id="container-slots-grid" class="grid gap-1"></div>

        <!-- Hint -->
        <div class="text-gray-400 text-center mt-2" style="font-size: 8px;">
            Click an item to take it out · click inventory items to put them in
        </div>
    </div>
</div>
{{end}}
