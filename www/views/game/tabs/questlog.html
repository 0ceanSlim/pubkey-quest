{{define "game/tabs/questlog.html"}}
<!-- Quest Log Panel -->
<div id="questlog-panel" class="tab-panel hidden">
    <div class="flex items-center justify-between mb-3 border-b border-yellow-800 pb-2">
        <span class="text-yellow-400 font-bold text-xs">📜 QUEST LOG</span>
        <span class="text-[10px] text-gray-400">Quest Points: <span id="quest-points-total" class="text-yellow-400 font-bold">0</span></span>
    </div>

    <!-- Available Quests -->
    <div class="mb-4">
        <div class="text-gray-400 text-xs mb-2">AVAILABLE</div>
        <div id="available-quests" class="space-y-2 text-xs">
            <div class="bg-gray-800 p-2 rounded text-gray-500 text-[10px]">Loading…</div>
        </div>
    </div>

    <!-- Active Quests -->
    <div class="mb-4">
        <div class="text-gray-400 text-xs mb-2">ACTIVE QUESTS</div>
        <div id="active-quests" class="space-y-2 text-xs"></div>
    </div>

    <!-- Completed Quests -->
    <div>
        <div class="text-gray-400 text-xs mb-2">COMPLETED</div>
        <div id="completed-quests" class="space-y-2 text-xs"></div>
    </div>
</div>
{{end}}
