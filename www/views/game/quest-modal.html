{{define "game/quest-modal.html"}}
<!-- Quest Detail Modal Overlay (drawn over the scene, scales with it) -->
<div id="quest-modal" class="hidden absolute z-50" style="top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); pointer-events: none;">
    <div class="relative bg-win95-bgDark m-2" style="border: 2px solid #b8860b; max-width: 300px; max-height: 88%; overflow-y: auto; margin-left: auto; margin-right: auto; margin-top: 24px; pointer-events: auto; box-shadow: 0 0 16px rgba(184,134,11,0.5);">
        <!-- Title Bar -->
        <div class="px-2 py-1 flex items-center gap-2" style="background: linear-gradient(90deg, #92400e, #b8860b);">
            <span style="font-size: 12px;">📜</span>
            <span class="text-white font-bold" style="font-size: 9px;">QUEST</span>
        </div>

        <!-- Content (populated by questDisplay) -->
        <div class="p-3 bg-win95-bgDark">
            <div id="quest-modal-content"></div>
            <button
                onclick="window.closeQuestModal && window.closeQuestModal()"
                class="mt-3 px-4 py-1 font-bold text-white"
                style="font-size: 8px; background: #0e7490; border-top: 2px solid #22d3ee; border-left: 2px solid #22d3ee; border-right: 2px solid #155e75; border-bottom: 2px solid #155e75;">
                CLOSE
            </button>
        </div>
    </div>
</div>
{{end}}
